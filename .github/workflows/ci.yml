 name: CI

  on:
    push:
      branches: [ "main" ]
    pull_request:
      branches: [ "main" ]

  jobs:
    build-and-test:
      name: Build & Test
      runs-on: ubuntu-latest

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup .NET
          uses: actions/setup-dotnet@v4
          with:
            dotnet-version: 9.0.x

        - name: Restore dependencies
          run: dotnet restore SaasApi.sln

        - name: Build
          run: dotnet build SaasApi.sln --no-restore -c Release

        - name: Run integration tests
          run: dotnet test tests/SaasApi.IntegrationTests/SaasApi.IntegrationTests.csproj --no-build -c Release --logger
          "console;verbosity=normal"
          
        - name: Publish test results
          uses: dorny/test-reporter@v1
          if: always()
          with:
            name: Integration Tests
            path: "**/*.trx"
            reporter: dotnet-trx

    docker-build:
      name: Docker Build
      runs-on: ubuntu-latest
      needs: build-and-test
      if: github.ref == 'refs/heads/main'

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Build Docker image
          run: docker build -f src/SaasApi.API/Dockerfile -t saas-api:${{ github.sha }} .